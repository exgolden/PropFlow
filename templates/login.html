<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <title>PropFlow — Iniciar sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/login.css') }}" rel="stylesheet">
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">
        <div class="toggle-track"><div class="toggle-thumb"></div></div>
        <span id="theme-label">Modo oscuro</span>
    </button>

    <div class="login-card">
        <div class="brand">
            <div class="brand-icon">
                <svg width="18" height="18" viewBox="0 0 14 14" fill="none">
                    <rect x="1" y="1" width="5" height="5" rx="1" fill="white"/>
                    <rect x="8" y="1" width="5" height="5" rx="1" fill="white"/>
                    <rect x="1" y="8" width="5" height="5" rx="1" fill="white"/>
                    <rect x="8" y="8" width="5" height="5" rx="1" fill="white"/>
                </svg>
            </div>
            <span class="brand-name">PropFlow</span>
        </div>

        <div class="error-msg" id="error-msg"></div>

        <div class="mb-3">
            <label class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" id="correo"
                placeholder="admin@arrendador.com" autocomplete="email">
        </div>
        <div class="mb-4">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="contrasena"
                placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-login" id="btn-login" onclick="handleLogin()">
            Iniciar sesión
        </button>
    </div>

    <script>
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        document.getElementById('theme-label').textContent =
            savedTheme === 'dark' ? 'Modo claro' : 'Modo oscuro';

        function toggleTheme() {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('theme-label').textContent =
                next === 'dark' ? 'Modo claro' : 'Modo oscuro';
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') handleLogin();
        });

        async function handleLogin() {
            const correo = document.getElementById('correo').value.trim();
            const contrasena = document.getElementById('contrasena').value;
            const btn = document.getElementById('btn-login');
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'none';
            if (!correo || !contrasena) {
                errorMsg.textContent = 'Por favor ingresa tu correo y contraseña.';
                errorMsg.style.display = 'block';
                return;
            }
            btn.disabled = true;
            btn.textContent = 'Iniciando sesión...';
            try {
                const res = await fetch('/usuarios/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, contrasena })
                });
                const data = await res.json();
                if (!res.ok) {
                    errorMsg.textContent = data.error || 'Error al iniciar sesión.';
                    errorMsg.style.display = 'block';
                    return;
                }
                window.location.href = '/dashboard';
            } catch (e) {
                errorMsg.textContent = 'Error de conexión. Intenta de nuevo.';
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Iniciar sesión';
            }
        }
    </script>
</body>
</html>
